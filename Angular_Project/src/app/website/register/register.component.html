<head>
    <!-- ... other tags ... -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<div class="register-container">
    <div class="register-header">
      <h2>Đăng ký</h2>
    </div>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label>Họ tên</label>
        <div class="input-with-icon">
          <i class="fas fa-user"></i>
          <input type="text" formControlName="fullName" placeholder="Nhập họ tên của bạn">
        </div>
      </div>
  
      <div class="form-group">
        <label>Tài khoản</label>
        <div class="input-with-icon">
          <i class="fas fa-user-circle"></i>
          <input type="text" formControlName="username" placeholder="Nhập tài khoản của bạn">
        </div>
      </div>
  
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-with-icon">
          <i class="fas fa-lock"></i>
          <input type="password" formControlName="password" placeholder="Nhập mật khẩu (5-15 ký tự)">
        </div>
      </div>
  
      <div class="form-group">
        <label>Nhập lại mật khẩu</label>
        <div class="input-with-icon">
          <i class="fas fa-lock"></i>
          <input type="password" formControlName="confirmPassword" placeholder="Nhập lại mật khẩu">
        </div>
      </div>
  
      <div class="form-group">
        <label>Giới tính</label>
        <div class="gender-options">
          <label class="radio-label">
            <input type="radio" formControlName="gender" value="Nam">
            <span>Nam</span>
          </label>
          <label class="radio-label">
            <input type="radio" formControlName="gender" value="Nữ">
            <span>Nữ</span>
          </label>
        </div>
      </div>
  
      <div class="form-group">
        <label>Ngày sinh</label>
        <div class="input-with-icon">
          <i class="fas fa-calendar"></i>
          <input type="date" formControlName="birthDate">
        </div>
      </div>
  
      <div class="form-group">
        <label>Email</label>
        <div class="input-with-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" formControlName="email" placeholder="Nhập địa chỉ email của bạn">
        </div>
      </div>

      <div class="form-group">
        <label>Điện thoại</label>
        <div class="input-with-icon">
          <i class="fas fa-phone"></i>
          <input type="tel" formControlName="phone" placeholder="Nhập số điện thoại">
        </div>
      </div>
  
      <div class="form-group">
        <label>Địa chỉ</label>
        <div class="input-with-icon">
          <i class="fas fa-map-marker-alt"></i>
          <input type="text" formControlName="address" placeholder="Nhập địa chỉ của bạn">
        </div>
      </div>
  
      <button type="submit" class="register-button">Đăng ký</button>
    </form>
  </div>
