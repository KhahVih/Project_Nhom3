<div class="login-container">
    <div class="login-header">
      <span>Đăng nhập</span>
      <a routerLink="/forgot-password" class="forgot-link">Quên mật khẩu</a>
    </div>
  
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <div class="input-with-icon">
          <div class="icon-container">
            <i class="fas fa-user"></i>
          </div>
          <input type="text" formControlName="username" placeholder="Tài khoản">
        </div>
      </div>
  
      <div class="form-group">
        <div class="input-with-icon">
          <div class="icon-container">
            <i class="fas fa-lock"></i>
          </div>
          <input type="password" formControlName="password" placeholder="Mật khẩu">
        </div>
      </div>
  
      <div class="form-actions">
        <button type="submit" class="login-button">Đăng nhập</button>
        <div class="remember-wrapper">
          <label class="remember-password">
            <input type="checkbox" formControlName="rememberPassword">
            <span>Nhớ mật khẩu</span>
          </label>
        </div>
      </div>
  
      <div class="register-prompt">
        <span>Bạn chưa có tài khoản! </span>
        <a routerLink="/register" class="register-link">Đăng ký</a>
      </div>
    </form>
  </div>
