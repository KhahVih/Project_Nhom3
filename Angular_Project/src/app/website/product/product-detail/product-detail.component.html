<!-- Thanh điều hướng -->
<nav class="breadcrumb-container">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb" *ngFor="let product of product">
                <li class="breadcrumb-item"><a href="#">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="#">Sản phẩm mới</a></li>
                <li class="breadcrumb-item active" aria-current="page">{{product.Name}}</li>
            </ol>
        </nav>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- Ảnh sản phẩm -->
        <div class="col-md-5" *ngFor="let product of product">
            <div class="product-images">
                <div class="thumb-images">
                    <img [src]="product.Images.Link" class="img-thumbnail active" alt="Ảnh nhỏ 1">
                </div>
                <div class="main-image">
                    <img [src]="product.Images.Link" class="img-fluid" alt="Ảnh chính">
                </div>
            </div>
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-md-7" *ngFor="let product of product">
            <h2 class="product-title">{{product.Name}}</h2>
            <p><strong>Mã sản phẩm:</strong> {{product.PosCode}}</p>
            <p><strong>Lượt xem:</strong> 232</p>
            <h3 class="price">{{product.Price | currency}}</h3>

            <div class="product-options">
                <p><strong>Size:</strong></p>
                <div class="btn-group" role="group" *ngFor="let size of size">
                    <button type="button" class="btn btn-outline-dark">{{size.Name}}</button>
                </div>

                <p class="mt-3"><strong>Màu:</strong></p>
                <div class="btn-group" role="group" *ngFor="let color of color">
                    <button type="button" class="btn btn-outline-dark">{{color.Name}}</button>
                </div>

                <p><strong>Số lượng:</strong></p>
                <div class="quantity">
                    <button class="btn btn-outline-dark">-</button>
                    <input type="text" value="1" class="quantity-input">
                    <button class="btn btn-outline-dark">+</button>
                </div>
            </div>

            <div class="buttons mt-4">
                <button class="btn btn-dark btn-lg"><i class="bi bi-cart"></i> Thêm vào giỏ</button>
                <button class="btn btn-dark btn-lg"><i class="bi bi-bag"></i> Mua ngay</button>
            </div>

            <p class="product-description mt-4">
                {{product.Description}}
            </p>
        </div>
    </div>
</div>

<!-- Nút chia sẻ mạng xã hội -->
<div class="social-icons">
    <a href="#" class="btn btn-primary"><i class="bi bi-facebook"></i></a>
    <a href="#" class="btn btn-info"><i class="bi bi-messenger"></i></a>
    <a href="#" class="btn btn-warning"><i class="bi bi-telephone"></i></a>
    <a href="#" class="btn btn-success"><i class="bi bi-chat-dots"></i></a>
</div>
